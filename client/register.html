<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — Vibe Social</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✨</text></svg>">
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/animations.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/pages.css">
  <link rel="stylesheet" href="/css/dark-mode.css">
</head>
<body class="auth-page">
  <div class="page-loader" id="page-loader">
    <div class="page-loader-logo">Vibe</div>
  </div>

  <button class="btn btn-icon theme-toggle-fixed" id="theme-toggle" aria-label="Toggle theme" style="position: fixed; top: var(--space-4); right: var(--space-4);">
    <span class="theme-icon">🌙</span>
  </button>

  <div class="auth-container animate-scale-in">
    <div class="auth-header">
      <a href="/" class="auth-logo">Vibe</a>
      <h2>Join the Club</h2>
      <p>Create an account to start sharing the vibe</p>
    </div>

    <form id="register-form">
      <div id="form-alert" class="form-error hidden" style="margin-bottom: var(--space-4); padding: var(--space-3); background: rgba(255, 118, 117, 0.1); border-radius: var(--radius-md);">
        <!-- Error messages injection -->
      </div>

      <div class="form-group">
        <label for="fullName" class="form-label">Full Name</label>
        <input type="text" id="fullName" name="fullName" class="form-input" placeholder="e.g. Alex Rivera" required>
      </div>

      <div class="form-group">
        <label for="username" class="form-label">Username</label>
        <input type="text" id="username" name="username" class="form-input" placeholder="e.g. alexrivera" required>
        <div class="form-hint">Only alphanumeric characters and underscores. Max 30 chars.</div>
      </div>

      <div class="form-group">
        <label for="email" class="form-label">Email Address</label>
        <input type="email" id="email" name="email" class="form-input" placeholder="e.g. alex@vibe.com" required>
      </div>

      <div class="form-group">
        <label for="password" class="form-label">Password</label>
        <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" required>
        <div class="password-strength" id="password-strength-indicator">
          <div class="password-strength-bar"></div>
          <div class="password-strength-bar"></div>
          <div class="password-strength-bar"></div>
        </div>
        <div class="form-hint" id="password-hint">Min 6 characters. Use letters & numbers.</div>
      </div>

      <button type="submit" class="btn btn-primary btn-block btn-lg" id="submit-btn">
        <span>Sign Up</span>
      </button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="/login" style="font-weight: 600; color: var(--primary);">Sign In</a>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script src="/js/theme.js"></script>
  <script src="/js/config.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    window.addEventListener('load', () => {
      const loader = document.getElementById('page-loader');
      loader.classList.add('fade-out');
      setTimeout(() => loader.remove(), 400);
    });

    // Password strength logic
    const passwordInput = document.getElementById('password');
    const bars = document.querySelectorAll('.password-strength-bar');
    
    passwordInput.addEventListener('input', () => {
      const val = passwordInput.value;
      
      // Clear statuses
      bars.forEach(bar => {
        bar.className = 'password-strength-bar';
      });

      if (!val) return;

      let score = 0;
      if (val.length >= 6) score++;
      if (val.match(/[0-9]/) && val.match(/[a-zA-Z]/)) score++;
      if (val.match(/[^a-zA-Z0-9]/)) score++;

      if (score === 1) {
        bars[0].classList.add('weak');
      } else if (score === 2) {
        bars[0].classList.add('medium');
        bars[1].classList.add('medium');
      } else if (score === 3) {
        bars[0].classList.add('strong');
        bars[1].classList.add('strong');
        bars[2].classList.add('strong');
      }
    });
  </script>
</body>
</html>
