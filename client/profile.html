<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — Vibe Social</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✨</text></svg>">
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/animations.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/pages.css">
  <link rel="stylesheet" href="/css/dark-mode.css">
</head>
<body>
  <div class="page-loader" id="page-loader">
    <div class="page-loader-logo">Vibe</div>
  </div>

  <div class="app-shell">
    <!-- Header -->
    <header class="app-header">
      <div style="display: flex; align-items: center; gap: var(--space-4);">
        <a href="/feed" class="header-logo" style="margin-right: 0;">Vibe</a>
      </div>
      <div class="header-actions">
        <button class="btn btn-icon" id="theme-toggle" aria-label="Toggle theme">
          <span class="theme-icon">🌙</span>
        </button>
        <a href="/feed" class="btn btn-icon">🏠</a>
      </div>
    </header>

    <!-- Sidebar -->
    <aside class="app-sidebar">
      <div class="sidebar-nav">
        <a href="/feed" class="nav-link">
          <span class="nav-icon">🏠</span>
          <span>Home</span>
        </a>
        <a href="/search" class="nav-link">
          <span class="nav-icon">🔍</span>
          <span>Explore</span>
        </a>
        <a href="/feed?tab=notifications" class="nav-link">
          <span class="nav-icon">🔔</span>
          <span>Notifications</span>
        </a>
        <a href="/settings" class="nav-link">
          <span class="nav-icon">⚙️</span>
          <span>Settings</span>
        </a>
        <a href="/profile" class="nav-link active" id="sidebar-profile-link">
          <span class="nav-icon">👤</span>
          <span>Profile</span>
        </a>
      </div>
    </aside>

    <!-- Main -->
    <main class="app-main animate-fade-in" style="max-width: 768px;">
      <!-- Profile Header -->
      <div class="profile-header-container">
        <div class="profile-cover">
          <img src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" id="profile-cover-img" alt="Cover photo">
          <label class="cover-upload-btn hidden" id="cover-upload-label" data-tooltip="Change Cover">
            <input type="file" id="cover-file-input" accept="image/*" style="display: none;">
            <span>📷</span>
          </label>
        </div>

        <div class="profile-info-section">
          <div class="profile-avatar-row">
            <div class="profile-avatar-wrapper">
              <div class="avatar avatar-2xl profile-avatar" id="profile-avatar-render">U</div>
              <label class="avatar-upload-btn hidden" id="avatar-upload-label" data-tooltip="Change Avatar">
                <input type="file" id="avatar-file-input" accept="image/*" style="display: none;">
                <span>📷</span>
              </label>
            </div>
            
            <div id="profile-action-btn-container">
              <!-- Edit profile or Follow/Unfollow button loaded dynamically -->
            </div>
          </div>

          <div class="profile-names">
            <h2 id="profile-full-name">Loading...</h2>
            <div class="username" id="profile-username">@loading</div>
          </div>

          <div class="profile-bio" id="profile-bio-text">
            <!-- Bio text -->
          </div>

          <div class="profile-meta-details">
            <div class="profile-meta-item hidden" id="profile-meta-location">
              <span>📍</span> <span class="val">Location</span>
            </div>
            <div class="profile-meta-item hidden" id="profile-meta-website">
              <span>🔗</span> <a href="#" target="_blank" class="val">Website</a>
            </div>
            <div class="profile-meta-item">
              <span>📅</span> <span>Joined</span> <span class="val" id="profile-meta-joined">Date</span>
            </div>
          </div>

          <div class="profile-stats">
            <div class="profile-stat-item" onclick="openFollowsModal('followers')">
              <span class="stat-val" id="stats-followers">0</span>
              <span class="stat-label">Followers</span>
            </div>
            <div class="profile-stat-item" onclick="openFollowsModal('following')">
              <span class="stat-val" id="stats-following">0</span>
              <span class="stat-label">Following</span>
            </div>
            <div class="profile-stat-item">
              <span class="stat-val" id="stats-posts">0</span>
              <span class="stat-label">Posts</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Feed filter tabs for profile -->
      <div class="tabs" style="margin-bottom: var(--space-6);">
        <button class="tab active" data-tab="posts">Posts</button>
        <button class="tab" data-tab="likes">Likes</button>
      </div>

      <!-- Profile Posts Feed -->
      <div id="profile-posts-container">
        <!-- Rendered lists -->
      </div>
    </main>

    <!-- Right suggestions/mock sidebar (hidden on small viewports) -->
    <aside class="app-aside">
      <div class="card">
        <div class="card-body">
          <h4 style="font-size: var(--text-sm); margin-bottom: var(--space-3);">Suggested vibes</h4>
          <div id="suggested-users-container" style="display: flex; flex-direction: column; gap: var(--space-2);"></div>
        </div>
      </div>
    </aside>

    <!-- Mobile Nav -->
    <nav class="app-mobile-nav">
      <a href="/feed" class="mobile-nav-link">
        <span>🏠</span>
        <span>Home</span>
      </a>
      <a href="/search" class="mobile-nav-link">
        <span>🔍</span>
        <span>Explore</span>
      </a>
      <a href="/feed?tab=notifications" class="mobile-nav-link">
        <span>🔔</span>
        <span>Alerts</span>
      </a>
      <a href="/profile" class="mobile-nav-link active">
        <span>👤</span>
        <span>Profile</span>
      </a>
    </nav>
  </div>

  <!-- Follows/Followers Modal -->
  <div class="modal-overlay" id="follows-modal">
    <div class="modal animate-modal">
      <div class="modal-header">
        <h3 id="follows-modal-title">Follows</h3>
        <button class="modal-close" onclick="closeFollowsModal()">&times;</button>
      </div>
      <div class="modal-body" id="follows-modal-body" style="max-height: 50vh; overflow-y: auto; display: flex; flex-direction: column; gap: var(--space-3);">
        <!-- Render followers or followings -->
      </div>
    </div>
  </div>

  <!-- Edit Profile Modal -->
  <div class="modal-overlay" id="edit-profile-modal">
    <div class="modal animate-modal">
      <div class="modal-header">
        <h3>Edit Profile</h3>
        <button class="modal-close" onclick="closeEditProfileModal()">&times;</button>
      </div>
      <div class="modal-body">
        <form id="edit-profile-form">
          <div class="form-group">
            <label for="edit-fullname" class="form-label">Full Name</label>
            <input type="text" id="edit-fullname" class="form-input" required>
          </div>
          <div class="form-group">
            <label for="edit-bio" class="form-label">Bio</label>
            <textarea id="edit-bio" class="form-input" style="min-height: 80px;" maxlength="160"></textarea>
          </div>
          <div class="form-group">
            <label for="edit-location" class="form-label">Location</label>
            <input type="text" id="edit-location" class="form-input">
          </div>
          <div class="form-group">
            <label for="edit-website" class="form-label">Website</label>
            <input type="text" id="edit-website" class="form-input" placeholder="https://example.com">
          </div>
          <button type="submit" class="btn btn-primary btn-block">Save Changes</button>
        </form>
      </div>
    </div>
  </div>

  <!-- Comments Sheet/Modal -->
  <div class="modal-overlay" id="comments-modal">
    <div class="modal animate-modal" style="max-width: 600px;">
      <div class="modal-header">
        <h3>Comments</h3>
        <button class="modal-close" onclick="closeCommentsModal()">&times;</button>
      </div>
      <div class="modal-body" style="padding: 0; display: flex; flex-direction: column; max-height: 70vh;">
        <div id="comment-post-context" style="padding: var(--space-4); border-bottom: 1px solid var(--border-light);"></div>
        <div id="comments-list-container" style="flex: 1; overflow-y: auto; padding: var(--space-4); min-height: 200px;"></div>
        <form id="comment-input-bar" style="padding: var(--space-4); border-top: 1px solid var(--border-color); display: flex; gap: var(--space-2); align-items: center; background: var(--bg-secondary);">
          <input type="text" id="comment-text-input" class="form-input" placeholder="Add a comment..." required style="flex: 1; min-height: 40px;">
          <button type="submit" class="btn btn-primary btn-sm" style="min-height: 40px;">Post</button>
        </form>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <!-- Scripts -->
  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/theme.js"></script>
  <script src="/js/config.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/socket.js"></script>
  <script src="/js/post.js"></script>
  <script src="/js/comments.js"></script>
  <script src="/js/profile.js"></script>
  <script src="/js/router.js"></script>
  <script>
    window.addEventListener('load', () => {
      const loader = document.getElementById('page-loader');
      loader.classList.add('fade-out');
      setTimeout(() => loader.remove(), 400);
    });

    const editModal = document.getElementById('edit-profile-modal');
    function closeEditProfileModal() {
      editModal.classList.remove('active');
    }

    const followsModal = document.getElementById('follows-modal');
    function closeFollowsModal() {
      followsModal.classList.remove('active');
    }

    const commentsModal = document.getElementById('comments-modal');
    function closeCommentsModal() {
      commentsModal.classList.remove('active');
      if (typeof window.activeCommentPostId !== 'undefined' && window.socket) {
        window.socket.emit('post:leave', window.activeCommentPostId);
      }
    }
  </script>
</body>
</html>
